name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "D-Mate ${{ github.ref_name }}"
          releaseBody: |
            ## D-Mate ${{ github.ref_name }}

            ### 다운로드
            | OS | 파일 |
            |------|------|
            | macOS (Apple Silicon) | `D-Mate_*_aarch64.dmg` |
            | macOS (Intel) | `D-Mate_*_x64.dmg` |
            | Windows | `D-Mate_*_x64-setup.exe` |

            ---

            ### macOS 설치
            1. DMG 다운로드 → 열기 → **Applications 폴더로 드래그**
            2. 터미널에서 보안 해제 (최초 1회):
            ```bash
            xattr -cr /Applications/D-Mate.app
            ```
            3. Applications에서 D-Mate 실행
            4. Keychain 접근 → **"항상 허용"** 선택

            ### Windows 설치
            1. `.exe` 다운로드
            2. **스마트 앱 컨트롤** 차단 시: 설정 → 개인 정보 및 보안 → Windows 보안 → 앱 및 브라우저 컨트롤 → 스마트 앱 컨트롤 → **끄기**
            3. SmartScreen 경고 시: **"추가 정보" → "실행"**
            4. 설치 마법사 진행

            ### 텔레그램 봇 생성
            1. 텔레그램에서 **@BotFather** 검색 → `/newbot` → 봇 생성
            2. 발급된 **토큰**을 D-Mate에 입력
            3. 봇에게 메시지 전송 후 → D-Mate에서 **채팅 조회**
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: D-Mate-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: ignore
