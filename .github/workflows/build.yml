name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: D-Mate-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Generate latest.json for Tauri updater
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAC_SIG=$(cat artifacts/D-Mate.app.tar.gz.sig 2>/dev/null || echo "")
          WIN_SIG=$(cat artifacts/D-Mate_${VERSION}_x64-setup.exe.sig 2>/dev/null || echo "")

          cat > artifacts/latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "D-Mate ${GITHUB_REF_NAME} 업데이트",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/dice-book-p/d-mate/releases/download/${GITHUB_REF_NAME}/D-Mate.app.tar.gz",
                "signature": "${MAC_SIG}"
              },
              "darwin-x86_64": {
                "url": "https://github.com/dice-book-p/d-mate/releases/download/${GITHUB_REF_NAME}/D-Mate.app.tar.gz",
                "signature": "${MAC_SIG}"
              },
              "windows-x86_64": {
                "url": "https://github.com/dice-book-p/d-mate/releases/download/${GITHUB_REF_NAME}/D-Mate_${VERSION}_x64-setup.exe",
                "signature": "${WIN_SIG}"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat artifacts/latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "D-Mate ${{ github.ref_name }}"
          draft: false
          body: |
            ## D-Mate ${{ github.ref_name }}

            ### 다운로드
            | OS | 파일 |
            |------|------|
            | macOS (Apple Silicon) | `D-Mate_*_aarch64.dmg` |
            | macOS (Intel) | `D-Mate_*_x64.dmg` |
            | Windows | `D-Mate_*_x64-setup.exe` |

            ---

            ### macOS 설치
            1. DMG 다운로드 → 열기 → **Applications 폴더로 드래그**
            2. 터미널에서 보안 해제 (최초 1회):
            ```bash
            xattr -cr /Applications/D-Mate.app
            ```
            3. Applications에서 D-Mate 실행
            4. Keychain 접근 → **"항상 허용"** 선택

            ### Windows 설치
            1. `.exe` 다운로드 → 브라우저 경고 시 **"유지"** 클릭
            2. **스마트 앱 컨트롤** 차단 시: 설정 → 개인 정보 및 보안 → Windows 보안 → 앱 및 브라우저 컨트롤 → 스마트 앱 컨트롤 → **끄기**
            3. SmartScreen 경고 시: **"추가 정보" → "실행"**
            4. 설치 마법사 진행

            ### 텔레그램 봇 생성
            1. 텔레그램에서 **@BotFather** 검색 → `/newbot` → 봇 생성
            2. 발급된 **토큰**을 D-Mate에 입력
            3. 봇에게 메시지 전송 후 → D-Mate에서 **채팅 조회**
          files: artifacts/**/*
